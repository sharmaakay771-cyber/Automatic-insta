<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>AI JARVIS SMART LAUNCHER – DARK NEON EDITION</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@400;500;600&display=swap');

    :root {
      --bg: #05070d;
      --bg-soft: rgba(7, 11, 20, 0.78);
      --glass: rgba(10, 17, 31, 0.55);
      --text: #e8f9ff;
      --muted: #9bc8d8;
      --glow-primary: #00f7ff;
      --glow-secondary: #007bff;
      --danger: #ff4d6d;
      --success: #3cffb2;
      --panel-border: rgba(0, 247, 255, 0.24);
      --shadow: 0 0 28px rgba(0, 247, 255, 0.18);
      --radius: 18px;
      --transition-fast: 180ms ease;
      --transition: 300ms ease;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'Poppins', sans-serif;
      touch-action: manipulation;
    }

    body.night-boost {
      --bg: #02040a;
      --glass: rgba(4, 8, 16, 0.68);
      --bg-soft: rgba(3, 6, 12, 0.88);
    }

    #launcher {
      position: fixed;
      inset: 0;
      display: grid;
      grid-template-rows: auto auto auto 1fr auto;
      padding: calc(10px + env(safe-area-inset-top)) 12px calc(10px + env(safe-area-inset-bottom));
      gap: 10px;
      background: radial-gradient(circle at 20% 10%, rgba(0, 247, 255, 0.11), transparent 30%),
                  radial-gradient(circle at 80% 80%, rgba(0, 123, 255, 0.18), transparent 34%),
                  linear-gradient(145deg, #03060f, #060a13 50%, #02040a);
      isolation: isolate;
    }

    canvas#particles {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
      opacity: 0.95;
    }

    .panel {
      background: var(--glass);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius);
      backdrop-filter: blur(12px);
      box-shadow: var(--shadow);
      transition: border-color var(--transition), box-shadow var(--transition), transform var(--transition-fast);
    }

    .panel:active {
      transform: scale(0.99);
    }

    .top-bar {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
    }

    .clock-wrap h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.2rem;
      letter-spacing: 0.08em;
      color: var(--glow-primary);
      text-shadow: 0 0 12px rgba(0, 247, 255, 0.7);
    }

    .clock-wrap p {
      font-size: 0.74rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .battery-widget {
      min-width: 72px;
      text-align: right;
      font-size: 0.75rem;
      color: var(--muted);
    }

    .battery-bar {
      width: 64px;
      height: 8px;
      margin-left: auto;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.1);
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(0, 247, 255, 0.4);
    }

    .battery-fill {
      position: absolute;
      inset: 0 auto 0 0;
      width: 80%;
      background: linear-gradient(90deg, var(--success), var(--glow-primary));
      box-shadow: 0 0 10px rgba(0, 247, 255, 0.7);
      transition: width 1s linear;
    }

    .search-panel {
      padding: 10px;
      display: grid;
      gap: 8px;
      position: relative;
    }

    .search-input {
      width: 100%;
      border: 1px solid rgba(0, 247, 255, 0.4);
      background: rgba(2, 8, 17, 0.85);
      border-radius: 14px;
      color: var(--text);
      padding: 12px 14px;
      font-size: 0.92rem;
      outline: none;
      transition: box-shadow var(--transition-fast), border-color var(--transition-fast);
    }

    .search-input:focus {
      border-color: var(--glow-primary);
      box-shadow: 0 0 16px rgba(0, 247, 255, 0.35);
    }

    .suggestions {
      max-height: 120px;
      overflow: auto;
      border-radius: 12px;
      border: 1px solid rgba(0, 247, 255, 0.25);
      background: rgba(2, 8, 18, 0.95);
      display: none;
    }

    .suggestion {
      padding: 9px 12px;
      font-size: 0.82rem;
      color: var(--muted);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .suggestion:last-child {
      border-bottom: 0;
    }

    .suggestion:active {
      background: rgba(0, 247, 255, 0.15);
      color: var(--text);
    }

    .grid-panel {
      padding: 8px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-auto-rows: minmax(56px, 1fr);
      gap: 8px;
      align-content: start;
      min-height: 0;
    }

    .app-tile {
      border-radius: 14px;
      border: 1px solid rgba(0, 247, 255, 0.22);
      background: rgba(3, 10, 20, 0.84);
      display: grid;
      justify-items: center;
      align-content: center;
      gap: 5px;
      position: relative;
      overflow: hidden;
      transition: transform var(--transition-fast), border-color var(--transition-fast), box-shadow var(--transition-fast);
    }

    .app-tile::after {
      content: '';
      position: absolute;
      inset: -50% auto auto -40%;
      width: 40px;
      height: 160%;
      transform: rotate(25deg);
      background: linear-gradient(transparent, rgba(255, 255, 255, 0.38), transparent);
      opacity: 0;
      transition: left var(--transition), opacity var(--transition-fast);
    }

    .app-tile:active,
    .app-tile.long-pressing {
      transform: translateY(-1px) scale(0.98);
      border-color: rgba(0, 247, 255, 0.65);
      box-shadow: 0 0 14px rgba(0, 247, 255, 0.35);
    }

    .app-tile:active::after,
    .app-tile.long-pressing::after {
      left: 120%;
      opacity: 1;
    }

    .app-icon {
      font-size: 1.1rem;
      filter: drop-shadow(0 0 7px rgba(0, 247, 255, 0.5));
    }

    .app-label {
      font-size: 0.67rem;
      color: var(--muted);
      text-align: center;
      line-height: 1.1;
    }

    .dock {
      display: flex;
      gap: 8px;
      justify-content: space-between;
      padding: 8px;
    }

    .chip {
      flex: 1;
      border-radius: 999px;
      padding: 9px 8px;
      text-align: center;
      font-size: 0.7rem;
      border: 1px solid rgba(0, 247, 255, 0.3);
      color: var(--muted);
      background: rgba(4, 11, 23, 0.85);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .drawer {
      position: fixed;
      inset: 0;
      transform: translateY(100%);
      transition: transform var(--transition);
      z-index: 20;
      padding: calc(20px + env(safe-area-inset-top)) 12px calc(10px + env(safe-area-inset-bottom));
      background: rgba(2, 5, 10, 0.92);
      backdrop-filter: blur(10px);
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 10px;
    }

    .drawer.open {
      transform: translateY(0);
    }

    .drawer-handle {
      width: 56px;
      height: 5px;
      border-radius: 999px;
      background: rgba(0, 247, 255, 0.55);
      margin: 0 auto;
      box-shadow: 0 0 10px rgba(0, 247, 255, 0.7);
    }

    .drawer-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.83rem;
      color: var(--glow-primary);
      letter-spacing: 0.05em;
      padding: 0 2px;
    }

    .drawer-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      align-content: start;
      overflow: hidden;
    }

    .section-panel {
      padding: 10px;
      font-size: 0.77rem;
      color: var(--muted);
      display: grid;
      gap: 8px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .toggle {
      width: 44px;
      height: 22px;
      border-radius: 999px;
      position: relative;
      border: 1px solid rgba(0, 247, 255, 0.4);
      background: rgba(255, 255, 255, 0.1);
      transition: background var(--transition-fast);
    }

    .toggle::before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      top: 2px;
      left: 2px;
      background: #fff;
      transition: left var(--transition-fast), background var(--transition-fast);
    }

    .toggle.active {
      background: rgba(0, 247, 255, 0.35);
    }

    .toggle.active::before {
      left: 24px;
      background: var(--glow-primary);
    }

    .orb {
      position: fixed;
      right: 16px;
      bottom: calc(28px + env(safe-area-inset-bottom));
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 2px solid rgba(0, 247, 255, 0.7);
      background: radial-gradient(circle, rgba(0, 247, 255, 0.4), rgba(0, 123, 255, 0.15) 60%, transparent 75%);
      box-shadow: 0 0 22px rgba(0, 247, 255, 0.7), 0 0 36px rgba(0, 123, 255, 0.45);
      z-index: 30;
      display: grid;
      place-items: center;
      animation: orbFloat 3s ease-in-out infinite, orbPulse 2.1s ease-in-out infinite;
    }

    .orb.listening {
      border-color: var(--success);
      box-shadow: 0 0 28px rgba(60, 255, 178, 0.8), 0 0 40px rgba(0, 247, 255, 0.4);
    }

    .orb-core {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: rgba(0, 247, 255, 0.8);
      box-shadow: 0 0 16px rgba(0, 247, 255, 0.7);
    }

    .overlay,
    .lock-screen,
    .pin-modal,
    .notif-stack {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 40;
    }

    .overlay.locked,
    .lock-screen.active,
    .pin-modal.active,
    .notif-stack.active {
      pointer-events: auto;
    }

    .lock-screen {
      display: none;
      place-items: center;
      background: rgba(0, 0, 0, 0.86);
    }

    .lock-screen.active {
      display: grid;
    }

    .fingerprint {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      border: 2px solid rgba(0, 247, 255, 0.7);
      box-shadow: 0 0 22px rgba(0, 247, 255, 0.5);
      display: grid;
      place-items: center;
      animation: orbPulse 2s infinite;
      font-family: 'Orbitron', sans-serif;
      color: var(--glow-primary);
      text-align: center;
      font-size: 0.75rem;
    }

    .pin-modal {
      display: none;
      place-items: center;
      background: rgba(2, 8, 16, 0.7);
    }

    .pin-modal.active {
      display: grid;
    }

    .pin-card {
      width: min(92vw, 320px);
      padding: 16px;
      display: grid;
      gap: 10px;
    }

    .pin-card h2 {
      font-family: 'Orbitron', sans-serif;
      color: var(--glow-primary);
      font-size: 1rem;
      letter-spacing: 0.06em;
      text-align: center;
    }

    .pin-input {
      width: 100%;
      text-align: center;
      background: rgba(5, 14, 28, 0.88);
      border: 1px solid rgba(0, 247, 255, 0.4);
      border-radius: 12px;
      color: var(--text);
      font-size: 1rem;
      padding: 12px;
      outline: none;
      letter-spacing: 0.2em;
    }

    .btn {
      border: 1px solid rgba(0, 247, 255, 0.5);
      border-radius: 12px;
      background: rgba(6, 16, 32, 0.95);
      color: var(--text);
      font-weight: 600;
      padding: 10px;
      font-size: 0.84rem;
    }

    .btn.alt {
      border-color: rgba(255, 255, 255, 0.18);
      color: var(--muted);
    }

    .notif-stack {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      gap: 8px;
      padding-top: calc(8px + env(safe-area-inset-top));
      z-index: 50;
    }

    .notif {
      width: min(92vw, 380px);
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(0, 247, 255, 0.35);
      background: rgba(4, 14, 26, 0.92);
      color: var(--text);
      font-size: 0.8rem;
      box-shadow: 0 0 12px rgba(0, 247, 255, 0.2);
      transform: translateY(-12px);
      opacity: 0;
      animation: slideIn 350ms ease forwards;
    }

    .notif.priority {
      border-color: rgba(255, 77, 109, 0.65);
      box-shadow: 0 0 16px rgba(255, 77, 109, 0.3);
    }

    .ripple {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      pointer-events: none;
      background: rgba(0, 247, 255, 0.45);
      transform: translate(-50%, -50%);
      animation: ripple 700ms ease-out forwards;
    }

    @keyframes orbFloat {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    @keyframes orbPulse {
      0%,100% { box-shadow: 0 0 14px rgba(0, 247, 255, 0.55), 0 0 28px rgba(0, 123, 255, 0.35); }
      50% { box-shadow: 0 0 30px rgba(0, 247, 255, 0.82), 0 0 42px rgba(0, 123, 255, 0.52); }
    }

    @keyframes ripple {
      from { opacity: 0.65; transform: translate(-50%, -50%) scale(1); }
      to { opacity: 0; transform: translate(-50%, -50%) scale(15); }
    }

    @keyframes slideIn {
      to { transform: translateY(0); opacity: 1; }
    }
  </style>
</head>
<body>
  <canvas id="particles"></canvas>

  <main id="launcher">
    <section class="top-bar panel">
      <div class="clock-wrap">
        <h1 id="clockTime">00:00</h1>
        <p id="clockDate">Loading date...</p>
      </div>
      <div class="battery-widget">
        <div class="battery-bar"><span class="battery-fill" id="batteryFill"></span></div>
        <small id="batteryText">Battery 80%</small>
      </div>
    </section>

    <section class="search-panel panel">
      <input id="searchInput" class="search-input" type="text" placeholder="Search apps / web / commands" autocomplete="off" />
      <div id="suggestions" class="suggestions"></div>
    </section>

    <section id="appGrid" class="grid-panel panel"></section>

    <section class="dock panel">
      <div class="chip" id="routineChip">Routine: Initializing...</div>
      <div class="chip" id="usageChip">Usage: 0 taps</div>
      <div class="chip" id="weatherChip">Weather: 27°C · Clear</div>
    </section>
  </main>

  <aside id="drawer" class="drawer">
    <div class="drawer-handle"></div>
    <div class="drawer-header">
      <span>APP DRAWER</span>
      <button id="closeDrawer" class="btn alt" type="button">Close</button>
    </div>
    <section id="drawerGrid" class="drawer-grid panel"></section>

    <section class="section-panel panel">
      <div class="row">
        <span>Hidden Apps Mode</span>
        <button id="hiddenToggle" class="toggle" type="button" aria-label="Toggle hidden apps mode"></button>
      </div>
      <div class="row">
        <span>Theme Store</span>
        <button id="themeStoreBtn" class="btn" type="button">Browse Themes</button>
      </div>
      <div class="row">
        <span>Premium Unlock</span>
        <button id="premiumBtn" class="btn" type="button">Unlock</button>
      </div>
      <div class="row" id="adSlotRow">
        <span>Ad Placeholder</span>
        <small>Jarvis Ads Module</small>
      </div>
    </section>
  </aside>

  <button id="jarvisOrb" class="orb" type="button" aria-label="Activate Jarvis">
    <span class="orb-core"></span>
  </button>

  <section id="lockScreen" class="lock-screen">
    <div class="fingerprint">Fingerprint<br/>Scan</div>
  </section>

  <section id="pinModal" class="pin-modal">
    <div class="pin-card panel">
      <h2>APP LOCK</h2>
      <input id="pinInput" class="pin-input" type="password" inputmode="numeric" maxlength="4" placeholder="Enter PIN" />
      <button id="unlockBtn" class="btn" type="button">Unlock Launcher</button>
      <button id="fingerprintBtn" class="btn alt" type="button">Use Fingerprint Animation</button>
    </div>
  </section>

  <section id="notifStack" class="notif-stack"></section>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <script>
    (() => {
      'use strict';

      const firebaseConfig = window.__JARVIS_FIREBASE_CONFIG__ || null;
      const BATTERY_DRAIN_RATE_PERCENT = 0.8;
      const BATTERY_LOW_THRESHOLD_PERCENT = 18;
      const BATTERY_RESET_VALUE_PERCENT = 95;
      const DOUBLE_TAP_THRESHOLD_MS = 300;
      const VOICE_ACTIVATION_LONG_PRESS_MS = 700;
      const APP_LONG_PRESS_MS = 380;
      const PARTICLE_MIN = 30;
      const PARTICLE_MAX = 70;
      const PARTICLE_DENSITY_DIVISOR = 5;
      const MAX_DEVICE_PIXEL_RATIO = 2;
      const PARTICLE_COLOR_PRIMARY = 'rgba(0,247,255,0.7)';
      const PARTICLE_COLOR_SECONDARY = 'rgba(0,123,255,0.56)';

      const state = {
        aiEnabled: true,
        adsEnabled: true,
        lockEnabled: true,
        hiddenMode: false,
        locked: true,
        themes: [],
        aiCommands: [
          { trigger: 'open youtube', response: 'Opening YouTube now.' },
          { trigger: 'open whatsapp', response: 'Opening WhatsApp web.' }
        ],
        activeThemeIndex: 0,
        usage: JSON.parse(localStorage.getItem('jarvisUsage') || '{}'),
        battery: 80,
        batteryRecharging: false,
        appList: [
          { name: 'YouTube', icon: '▶️', url: 'https://youtube.com', hidden: false },
          { name: 'WhatsApp', icon: '💬', url: 'https://web.whatsapp.com', hidden: false },
          { name: 'Instagram', icon: '📸', url: 'https://instagram.com', hidden: false },
          { name: 'Gmail', icon: '✉️', url: 'https://mail.google.com', hidden: false },
          { name: 'Maps', icon: '🗺️', url: 'https://maps.google.com', hidden: false },
          { name: 'Drive', icon: '☁️', url: 'https://drive.google.com', hidden: false },
          { name: 'Music', icon: '🎵', url: 'https://music.youtube.com', hidden: true },
          { name: 'Netflix', icon: '🎬', url: 'https://netflix.com', hidden: true },
          { name: 'X', icon: '📰', url: 'https://x.com', hidden: false },
          { name: 'Calendar', icon: '📅', url: 'https://calendar.google.com', hidden: false },
          { name: 'Docs', icon: '📝', url: 'https://docs.google.com', hidden: false },
          { name: 'Photos', icon: '🖼️', url: 'https://photos.google.com', hidden: false },
          { name: 'ChatGPT', icon: '🤖', url: 'https://chat.openai.com', hidden: false },
          { name: 'GitHub', icon: '🐙', url: 'https://github.com', hidden: false },
          { name: 'Weather', icon: '🌤️', url: 'https://google.com/search?q=weather', hidden: false },
          { name: 'Prime', icon: '📺', url: 'https://primevideo.com', hidden: true },
          { name: 'Notes', icon: '📒', url: 'https://keep.google.com', hidden: false },
          { name: 'Terminal', icon: '⌨️', url: 'https://replit.com', hidden: true },
          { name: 'Store', icon: '🛍️', url: 'https://play.google.com', hidden: false },
          { name: 'News', icon: '🗞️', url: 'https://news.google.com', hidden: false }
        ]
      };

      const el = {
        appGrid: document.getElementById('appGrid'),
        drawerGrid: document.getElementById('drawerGrid'),
        drawer: document.getElementById('drawer'),
        closeDrawer: document.getElementById('closeDrawer'),
        jarvisOrb: document.getElementById('jarvisOrb'),
        searchInput: document.getElementById('searchInput'),
        suggestions: document.getElementById('suggestions'),
        hiddenToggle: document.getElementById('hiddenToggle'),
        routineChip: document.getElementById('routineChip'),
        usageChip: document.getElementById('usageChip'),
        weatherChip: document.getElementById('weatherChip'),
        clockTime: document.getElementById('clockTime'),
        clockDate: document.getElementById('clockDate'),
        batteryFill: document.getElementById('batteryFill'),
        batteryText: document.getElementById('batteryText'),
        lockScreen: document.getElementById('lockScreen'),
        pinModal: document.getElementById('pinModal'),
        pinInput: document.getElementById('pinInput'),
        unlockBtn: document.getElementById('unlockBtn'),
        fingerprintBtn: document.getElementById('fingerprintBtn'),
        notifStack: document.getElementById('notifStack'),
        adSlotRow: document.getElementById('adSlotRow'),
        themeStoreBtn: document.getElementById('themeStoreBtn'),
        premiumBtn: document.getElementById('premiumBtn'),
        particles: document.getElementById('particles')
      };

      let dbRoot = null;
      let speechRecognition = null;
      let longPressTimer = null;
      let gestureStartY = null;
      let lastTapTime = 0;
      let particleBounds = { width: window.innerWidth, height: window.innerHeight };

      function getConfiguredPin() {
        let pin = localStorage.getItem('jarvisPin');
        if (!/^\d{4}$/.test(pin || '')) {
          pin = generateSecurePin();
          while (isWeakPin(pin)) {
            pin = generateSecurePin();
          }
          localStorage.setItem('jarvisPin', pin);
          notify(`New secure launcher PIN: ${pin}`, true);
        }
        return pin;
      }

      function generateSecurePin() {
        const source = new Uint32Array(1);
        if (window.crypto && typeof window.crypto.getRandomValues === 'function') {
          window.crypto.getRandomValues(source);
          return String(1000 + (source[0] % 9000));
        }
        return String(1000 + Math.floor(Math.random() * 9000));
      }

      function isWeakPin(pin) {
        if (!/^\d{4}$/.test(pin)) return true;
        if (/^(\d)\1{3}$/.test(pin)) return true;
        if (pin === '1234' || pin === '4321') return true;
        const digits = pin.split('').map(Number);
        const asc = digits.every((d, i) => i === 0 || d - digits[i - 1] === 1);
        const desc = digits.every((d, i) => i === 0 || digits[i - 1] - d === 1);
        return asc || desc;
      }

      function initFirebase() {
        try {
          if (!window.firebase || !isValidFirebaseConfig(firebaseConfig)) {
            notify('Firebase config missing. Using offline mode.', false);
            return;
          }
          if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
          }
          dbRoot = firebase.database().ref('JarvisLauncher');
          bindRealtimeData();
        } catch (error) {
          notify('Firebase init failed. Offline mode enabled.', true);
        }
      }

      function bindRealtimeData() {
        if (!dbRoot) return;

        dbRoot.child('settings').on('value', (snap) => {
          const data = snap.val() || {};
          state.adsEnabled = data.adsEnabled !== false;
          state.aiEnabled = data.aiEnabled !== false;
          state.lockEnabled = data.lockEnabled !== false;
          el.adSlotRow.style.display = state.adsEnabled ? 'flex' : 'none';
        });

        dbRoot.child('themes').on('value', (snap) => {
          const raw = snap.val() || {};
          state.themes = Object.values(raw).filter(Boolean);
          if (state.themes.length > 0) {
            applyTheme(state.themes[state.activeThemeIndex % state.themes.length]);
          }
        });

        dbRoot.child('aiCommands').on('value', (snap) => {
          const raw = snap.val() || {};
          const commands = Object.values(raw)
            .filter((item) => item && item.trigger && item.response)
            .map((item) => ({
              trigger: String(item.trigger).toLowerCase().trim(),
              response: String(item.response)
            }));
          if (commands.length) {
            state.aiCommands = commands;
          }
        });
      }

      function isValidFirebaseConfig(config) {
        if (!config || typeof config !== 'object' || !config.databaseURL) return false;
        try {
          const parsed = new URL(String(config.databaseURL));
          const apiKey = String(config.apiKey || '').trim();
          const projectId = String(config.projectId || '').trim();
          const isTrustedHost = /(^|\.)firebaseio\.com$|(^|\.)firebasedatabase\.app$/i.test(parsed.hostname);
          return parsed.protocol === 'https:' && isTrustedHost && apiKey.length > 8 && projectId.length > 2;
        } catch (error) {
          return false;
        }
      }

      function withAlpha(color, alpha) {
        if (typeof color !== 'string') return '';
        const v = color.trim();
        if (/^#([0-9a-f]{3}|[0-9a-f]{6})$/i.test(v)) {
          const hex = v.length === 4
            ? '#' + v.slice(1).split('').map((c) => c + c).join('')
            : v;
          const alphaHex = Math.round(Math.min(Math.max(alpha, 0), 1) * 255).toString(16).padStart(2, '0');
          return hex + alphaHex;
        }
        const rgbMatch = v.match(/^rgba?\(([^)]+)\)$/i);
        if (!rgbMatch) return '';
        const parts = rgbMatch[1].split(',').map((item) => item.trim());
        if (parts.length < 3) return '';
        const [r, g, b] = parts;
        return `rgba(${r}, ${g}, ${b}, ${Math.min(Math.max(alpha, 0), 1)})`;
      }

      function applyTheme(theme) {
        if (!theme) return;
        const root = document.documentElement;
        if (theme.bgColor) root.style.setProperty('--bg', theme.bgColor);
        if (theme.glowColor) {
          root.style.setProperty('--glow-primary', theme.glowColor);
          const borderColor = withAlpha(theme.glowColor, 0.4);
          if (borderColor) {
            root.style.setProperty('--panel-border', borderColor);
          }
        }
        notify(`Theme applied: ${theme.name || 'Jarvis Theme'}`);
      }

      function speak(text) {
        if (!('speechSynthesis' in window)) return;
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.rate = 1;
        utterance.pitch = 1;
        speechSynthesis.cancel();
        speechSynthesis.speak(utterance);
      }

      function runCommand(rawInput) {
        const input = String(rawInput || '').trim().toLowerCase();
        if (!input) return;

        if (input.startsWith('search ')) {
          const query = input.replace(/^search\s+/, '').trim();
          speak(`Searching ${query}`);
          openUrl('https://www.google.com/search?q=' + encodeURIComponent(query), 'Google Search');
          return;
        }

        const directMap = {
          'open youtube': 'https://youtube.com',
          'open whatsapp': 'https://web.whatsapp.com'
        };

        if (directMap[input]) {
          speak(`Executing command. ${input}`);
          openUrl(directMap[input], input);
          return;
        }

        const matched = state.aiCommands.find((cmd) => input.includes(cmd.trigger));
        if (matched) {
          speak(matched.response);
          notify(`AI: ${matched.response}`);
          return;
        }

        speak('Command not found. Please try again.');
        notify('AI fallback: command not recognized', true);
      }

      function initSpeech() {
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) {
          notify('Speech recognition not supported on this browser.', true);
          return;
        }

        speechRecognition = new SR();
        speechRecognition.lang = 'en-US';
        speechRecognition.continuous = false;
        speechRecognition.interimResults = false;

        speechRecognition.onstart = () => {
          el.jarvisOrb.classList.add('listening');
          notify('JARVIS listening...');
        };

        speechRecognition.onend = () => {
          el.jarvisOrb.classList.remove('listening');
        };

        speechRecognition.onerror = () => {
          notify('Voice recognition error. Try again.', true);
        };

        speechRecognition.onresult = (event) => {
          const transcript = event.results?.[0]?.[0]?.transcript || '';
          notify(`Heard: ${transcript}`);
          runCommand(transcript);
        };
      }

      function startListening() {
        if (!state.aiEnabled) {
          notify('AI is disabled by admin settings.', true);
          return;
        }
        if (!speechRecognition) {
          notify('Speech module unavailable.', true);
          return;
        }
        speechRecognition.start();
      }

      function openUrl(url, appName) {
        const normalized = String(url || '').trim();
        if (!normalized) {
          notify('Invalid target URL', true);
          return;
        }
        if (/^(javascript|data|vbscript|file):/i.test(normalized)) {
          notify('Blocked unsafe URL protocol', true);
          return;
        }
        let safeUrl = '';
        try {
          safeUrl = new URL(/^https?:\/\//i.test(normalized) ? normalized : `https://${normalized}`).toString();
        } catch (error) {
          notify('Blocked malformed URL', true);
          return;
        }
        bumpUsage(appName || safeUrl);
        window.open(safeUrl, '_blank', 'noopener');
      }

      function bumpUsage(key) {
        state.usage[key] = (state.usage[key] || 0) + 1;
        localStorage.setItem('jarvisUsage', JSON.stringify(state.usage));
        const total = Object.values(state.usage).reduce((sum, count) => sum + count, 0);
        el.usageChip.textContent = `Usage: ${total} taps`;
      }

      function appTileTemplate(app) {
        const safeName = escapeHtml(app.name);
        const safeIcon = escapeHtml(app.icon);
        const safeUrl = escapeHtml(app.url);
        return `<button class="app-tile" data-name="${safeName}" data-url="${safeUrl}" type="button">
          <span class="app-icon">${safeIcon}</span>
          <span class="app-label">${safeName}</span>
        </button>`;
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function renderApps() {
        const visibleApps = state.appList.filter((app) => state.hiddenMode || !app.hidden);
        const primary = visibleApps.slice(0, 20);
        const drawerApps = visibleApps;
        el.appGrid.innerHTML = primary.map(appTileTemplate).join('');
        el.drawerGrid.innerHTML = drawerApps.map(appTileTemplate).join('');

        [el.appGrid, el.drawerGrid].forEach((grid) => {
          grid.querySelectorAll('.app-tile').forEach((tile) => {
            bindTileInteractions(tile);
          });
        });
      }

      function bindTileInteractions(tile) {
        let pressed = false;
        let tilePressTimer = null;

        const startPress = () => {
          pressed = true;
          clearTimeout(tilePressTimer);
          tilePressTimer = setTimeout(() => {
            if (!pressed) return;
            tile.classList.add('long-pressing');
            notify(`Long press: ${tile.dataset.name}`);
            setTimeout(() => tile.classList.remove('long-pressing'), 450);
          }, APP_LONG_PRESS_MS);
        };

        const endPress = () => {
          pressed = false;
          clearTimeout(tilePressTimer);
        };

        tile.addEventListener('touchstart', startPress, { passive: true });
        tile.addEventListener('touchend', endPress, { passive: true });
        tile.addEventListener('mousedown', startPress);
        tile.addEventListener('mouseup', endPress);
        tile.addEventListener('mouseleave', endPress);

        tile.addEventListener('click', () => {
          ripple(tile);
          openUrl(tile.dataset.url, tile.dataset.name);
        });
      }

      function searchSuggestions(value) {
        const q = value.toLowerCase().trim();
        if (!q) {
          el.suggestions.style.display = 'none';
          el.suggestions.innerHTML = '';
          return;
        }

        const appMatches = state.appList
          .filter((app) => (state.hiddenMode || !app.hidden) && app.name.toLowerCase().includes(q))
          .slice(0, 5)
          .map((app) => ({ label: `Open ${app.name}`, action: () => openUrl(app.url, app.name) }));

        const commandMatches = state.aiCommands
          .filter((cmd) => cmd.trigger.includes(q))
          .slice(0, 3)
          .map((cmd) => ({ label: `AI: ${cmd.trigger}`, action: () => runCommand(cmd.trigger) }));

        const list = [...appMatches, ...commandMatches, {
          label: `Search web for "${value}"`,
          action: () => openUrl('https://www.google.com/search?q=' + encodeURIComponent(value), 'Web Search')
        }];

        el.suggestions.innerHTML = list.map((item, index) =>
          `<button class="suggestion" data-index="${index}" type="button">${escapeHtml(item.label)}</button>`
        ).join('');

        el.suggestions.style.display = 'block';

        el.suggestions.querySelectorAll('.suggestion').forEach((node) => {
          node.onclick = () => {
            const action = list[Number(node.dataset.index)]?.action;
            if (action) action();
            el.suggestions.style.display = 'none';
          };
        });
      }

      function notify(message, priority) {
        const node = document.createElement('div');
        node.className = 'notif' + (priority ? ' priority' : '');
        node.textContent = message;
        el.notifStack.appendChild(node);
        el.notifStack.classList.add('active');
        setTimeout(() => {
          node.remove();
          if (!el.notifStack.children.length) {
            el.notifStack.classList.remove('active');
          }
        }, priority ? 3400 : 2400);
      }

      function lockLauncher(animated) {
        state.locked = true;
        if (!state.lockEnabled) return;
        if (animated) {
          el.lockScreen.classList.add('active');
          setTimeout(() => {
            el.lockScreen.classList.remove('active');
            el.pinModal.classList.add('active');
            el.pinInput.focus();
          }, 1400);
        } else {
          el.pinModal.classList.add('active');
          el.pinInput.focus();
        }
      }

      function unlockLauncher() {
        const pin = el.pinInput.value.trim();
        if (pin === getConfiguredPin()) {
          state.locked = false;
          el.pinInput.value = '';
          el.pinModal.classList.remove('active');
          notify('Launcher unlocked');
          return;
        }
        notify('Invalid PIN', true);
      }

      function setupWidgets() {
        const updateClock = () => {
          const now = new Date();
          el.clockTime.textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
          el.clockDate.textContent = now.toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric' });
          routineEngine(now);
        };

        updateClock();
        setInterval(updateClock, 1000);

        setInterval(() => {
          if (state.batteryRecharging) {
            state.battery += 2.2;
            if (state.battery >= BATTERY_RESET_VALUE_PERCENT) {
              state.battery = BATTERY_RESET_VALUE_PERCENT;
              state.batteryRecharging = false;
            }
          } else {
            state.battery = Math.max(0, state.battery - (Math.random() * BATTERY_DRAIN_RATE_PERCENT));
            if (state.battery < BATTERY_LOW_THRESHOLD_PERCENT) {
              state.batteryRecharging = true;
            }
          }
          const pct = Math.max(1, Math.round(state.battery));
          el.batteryFill.style.width = pct + '%';
          el.batteryText.textContent = `Battery ${pct}%`;
        }, 5000);
      }

      function routineEngine(now) {
        const h = now.getHours();
        if (h >= 5 && h < 12) {
          el.routineChip.textContent = 'Routine: Good morning, commander';
        } else if (h >= 12 && h < 18) {
          el.routineChip.textContent = 'Routine: Productivity mode engaged';
        } else {
          el.routineChip.textContent = 'Routine: Night protocol active';
        }

        document.body.classList.toggle('night-boost', h >= 19 || h < 6);

        const routineKey = `jarvisMorningPrompt:${now.toDateString()}`;
        if (h === 8 && now.getMinutes() <= 5 && now.getSeconds() === 0 && !localStorage.getItem(routineKey)) {
          localStorage.setItem(routineKey, 'sent');
          notify('Morning suggestion: Review priorities and hydrate.', false);
        }
      }

      function bindGestures() {
        document.addEventListener('touchstart', (event) => {
          gestureStartY = event.touches[0].clientY;
        }, { passive: true });

        document.addEventListener('touchend', (event) => {
          const endY = event.changedTouches[0].clientY;
          if (gestureStartY !== null && gestureStartY - endY > 70) {
            el.drawer.classList.add('open');
          }
          gestureStartY = null;
        }, { passive: true });

        document.addEventListener('click', (event) => {
          const now = Date.now();
          if (now - lastTapTime < DOUBLE_TAP_THRESHOLD_MS) {
            lockLauncher(true);
          }
          lastTapTime = now;
        });

        document.addEventListener('pointerdown', () => {
          const active = document.activeElement;
          if (active && /^(INPUT|TEXTAREA|BUTTON|SELECT)$/.test(active.tagName)) return;
          clearTimeout(longPressTimer);
          longPressTimer = setTimeout(() => startListening(), VOICE_ACTIVATION_LONG_PRESS_MS);
        });

        document.addEventListener('pointerup', () => {
          clearTimeout(longPressTimer);
        });
      }

      function setupInteractions() {
        el.closeDrawer.addEventListener('click', () => el.drawer.classList.remove('open'));
        el.jarvisOrb.addEventListener('click', (event) => {
          ripple(el.jarvisOrb, event.clientX, event.clientY);
          startListening();
        });

        el.searchInput.addEventListener('input', (e) => searchSuggestions(e.target.value));
        el.searchInput.addEventListener('keydown', (event) => {
          if (event.key === 'Enter') {
            runCommand(event.target.value.startsWith('search ') ? event.target.value : 'search ' + event.target.value);
            el.suggestions.style.display = 'none';
          }
        });

        el.hiddenToggle.addEventListener('click', () => {
          state.hiddenMode = !state.hiddenMode;
          el.hiddenToggle.classList.toggle('active', state.hiddenMode);
          renderApps();
          notify(state.hiddenMode ? 'Hidden apps are now visible.' : 'Hidden apps are concealed.');
        });

        el.themeStoreBtn.addEventListener('click', () => {
          if (!state.themes.length) {
            notify('No online themes available. Using default.', true);
            return;
          }
          state.activeThemeIndex = (state.activeThemeIndex + 1) % state.themes.length;
          applyTheme(state.themes[state.activeThemeIndex]);
        });

        el.premiumBtn.addEventListener('click', () => {
          notify('Premium UI unlocked: Neon+ Pack activated.');
        });

        el.unlockBtn.addEventListener('click', unlockLauncher);
        el.pinInput.addEventListener('keydown', (event) => {
          if (event.key === 'Enter') unlockLauncher();
        });

        el.fingerprintBtn.addEventListener('click', () => {
          el.pinModal.classList.remove('active');
          el.lockScreen.classList.add('active');
          setTimeout(() => {
            el.lockScreen.classList.remove('active');
            state.locked = false;
            notify('Fingerprint accepted');
          }, 1800);
        });
      }

      function ripple(target, x, y) {
        const rect = target.getBoundingClientRect();
        const r = document.createElement('span');
        r.className = 'ripple';
        r.style.left = (x ? x - rect.left : rect.width / 2) + 'px';
        r.style.top = (y ? y - rect.top : rect.height / 2) + 'px';
        target.appendChild(r);
        setTimeout(() => r.remove(), 700);
      }

      function initParticles() {
        const canvas = el.particles;
        const ctx = canvas.getContext('2d', { alpha: true });
        const dots = [];

        function resize() {
          const dpr = Math.min(window.devicePixelRatio || 1, MAX_DEVICE_PIXEL_RATIO);
          canvas.width = Math.round(window.innerWidth * dpr);
          canvas.height = Math.round(window.innerHeight * dpr);
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
          particleBounds = { width: canvas.width / dpr, height: canvas.height / dpr };
        }

        function resetDots() {
          dots.length = 0;
          const count = Math.max(PARTICLE_MIN, Math.min(PARTICLE_MAX, Math.floor(window.innerWidth / PARTICLE_DENSITY_DIVISOR)));
          for (let i = 0; i < count; i += 1) {
            dots.push({
              x: Math.random() * particleBounds.width,
              y: Math.random() * particleBounds.height,
              vx: (Math.random() - 0.5) * 0.45,
              vy: (Math.random() - 0.5) * 0.45,
              r: Math.random() * 1.8 + 0.6
            });
          }
        }

        function animate() {
          ctx.clearRect(0, 0, particleBounds.width, particleBounds.height);
          for (let i = 0; i < dots.length; i += 1) {
            const d = dots[i];
            d.x += d.vx;
            d.y += d.vy;

            if (d.x < 0 || d.x > particleBounds.width) d.vx *= -1;
            if (d.y < 0 || d.y > particleBounds.height) d.vy *= -1;

            ctx.beginPath();
            ctx.fillStyle = i % 2 ? PARTICLE_COLOR_PRIMARY : PARTICLE_COLOR_SECONDARY;
            ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
            ctx.fill();
          }
          requestAnimationFrame(animate);
        }

        resize();
        resetDots();
        animate();

        window.addEventListener('resize', () => {
          resize();
          resetDots();
        });
      }

      function initWeather() {
        const hour = new Date().getHours();
        const status = hour >= 6 && hour <= 17 ? 'Sunny' : 'Clear Night';
        el.weatherChip.textContent = `Weather: 27°C · ${status}`;
      }

      function boot() {
        renderApps();
        setupWidgets();
        initWeather();
        initParticles();
        setupInteractions();
        bindGestures();
        initSpeech();
        initFirebase();
        if (state.lockEnabled) {
          lockLauncher(false);
        }
        notify('AI Jarvis Smart Launcher ready.');
      }

      boot();
    })();
  </script>
</body>
</html>
